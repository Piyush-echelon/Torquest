name: Build Linux Packages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'android/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Electron App (Linux)
        run: npx electron-builder --linux deb snap AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: torquest-linux-packages
          path: |
            dist/*.deb
            dist/*.snap
            dist/*.AppImage
          retention-days: 5
